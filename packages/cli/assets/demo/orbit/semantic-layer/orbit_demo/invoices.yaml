name: invoices
table: invoices
description: Billing invoices with payment status and revenue-recognition dates.
grain:
  - invoice_id
columns:
  - name: invoice_id
    type: string
  - name: account_id
    type: string
  - name: subscription_id
    type: string
  - name: invoice_date
    type: time
  - name: paid_at
    type: time
  - name: status
    type: string
  - name: currency
    type: string
joins:
  - to: accounts
    "on": "account_id = accounts.account_id"
    relationship: many_to_one
measures:
  - name: invoice_count
    expr: "count(*)"
  - name: paid_invoice_count
    expr: "count(*)"
    filter: "status = 'paid'"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
