name: arr_movements
table: arr_movements
description: ARR movement ledger for expansion, contraction, churn, and reactivation analysis.
grain:
  - arr_movement_id
columns:
  - name: arr_movement_id
    type: string
  - name: account_id
    type: string
  - name: parent_account_id
    type: string
  - name: contract_id
    type: string
  - name: movement_date
    type: time
  - name: movement_type
    type: string
  - name: movement_reason
    type: string
  - name: arr_delta_cents
    type: number
  - name: starting_arr_cents
    type: number
  - name: ending_arr_cents
    type: number
joins:
  - to: accounts
    "on": "account_id = accounts.account_id"
    relationship: many_to_one
measures:
  - name: movement_count
    expr: "count(*)"
  - name: net_arr_delta
    expr: "sum(arr_delta_cents) / 100.0"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
