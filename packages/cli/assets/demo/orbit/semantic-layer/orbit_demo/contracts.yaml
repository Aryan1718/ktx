name: contracts
table: contracts
description: Subscription contracts with ARR, plan, renewal, and status details.
grain:
  - contract_id
columns:
  - name: contract_id
    type: string
  - name: account_id
    type: string
  - name: parent_account_id
    type: string
  - name: plan_id
    type: string
  - name: contract_arr_cents
    type: number
  - name: booked_arr_cents
    type: number
  - name: start_date
    type: time
  - name: end_date
    type: time
  - name: status
    type: string
  - name: renewal_type
    type: string
joins:
  - to: accounts
    "on": "account_id = accounts.account_id"
    relationship: many_to_one
measures:
  - name: contract_count
    expr: "count(distinct contract_id)"
  - name: total_arr
    expr: "sum(contract_arr_cents) / 100.0"
    filter: "status = 'active'"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
