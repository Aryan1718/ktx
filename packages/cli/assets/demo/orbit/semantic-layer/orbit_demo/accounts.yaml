name: accounts
table: accounts
description: Customer accounts with industry, region, lifecycle, and internal/test flags.
grain:
  - account_id
columns:
  - name: account_id
    type: string
  - name: parent_account_id
    type: string
  - name: account_name
    type: string
  - name: domain
    type: string
  - name: industry
    type: string
  - name: sales_region
    type: string
  - name: size_band
    type: string
  - name: lifecycle_status
    type: string
  - name: is_internal
    type: boolean
  - name: is_test
    type: boolean
  - name: created_at
    type: time
joins:
  - to: contracts
    "on": "account_id = contracts.account_id"
    relationship: one_to_many
  - to: purchase_requests
    "on": "account_id = purchase_requests.account_id"
    relationship: one_to_many
measures:
  - name: account_count
    expr: "count(distinct account_id)"
  - name: enterprise_count
    expr: "count(distinct account_id)"
    filter: "size_band = 'enterprise'"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
