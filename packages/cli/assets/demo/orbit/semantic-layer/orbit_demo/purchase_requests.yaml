name: purchase_requests
table: purchase_requests
description: Procurement workflow requests with requester, status, supplier, and spend fields.
grain:
  - purchase_request_id
columns:
  - name: purchase_request_id
    type: string
  - name: account_id
    type: string
  - name: requester_user_id
    type: string
  - name: created_at
    type: time
  - name: status
    type: string
  - name: amount_cents
    type: number
  - name: supplier_id
    type: string
joins:
  - to: accounts
    "on": "account_id = accounts.account_id"
    relationship: many_to_one
measures:
  - name: request_count
    expr: "count(*)"
  - name: approved_spend
    expr: "sum(amount_cents) / 100.0"
    filter: "status = 'approved'"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
