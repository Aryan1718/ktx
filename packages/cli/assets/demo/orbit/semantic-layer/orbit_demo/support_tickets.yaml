name: support_tickets
table: support_tickets
description: Customer support tickets with severity, category, status, and resolution tracking.
grain:
  - support_ticket_id
columns:
  - name: support_ticket_id
    type: string
  - name: account_id
    type: string
  - name: requester_user_id
    type: string
  - name: severity
    type: string
  - name: category
    type: string
  - name: status
    type: string
  - name: created_at
    type: time
  - name: resolved_at
    type: time
  - name: owner_user_id
    type: string
joins:
  - to: accounts
    "on": "account_id = accounts.account_id"
    relationship: many_to_one
measures:
  - name: ticket_count
    expr: "count(*)"
  - name: open_ticket_count
    expr: "count(*)"
    filter: "status != 'resolved'"
segments:
  - name: external_only
    expr: "coalesce(is_internal, 0) = 0 AND coalesce(is_test, 0) = 0"
